name: brolly
description: "Brolly — an ad-free UK-focused weather and radar app. The forecast, without the noise."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking + serialization
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Map + radar
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Local storage
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Images
  cached_network_image: ^3.4.1

  # Routing
  go_router: ^14.2.7

  # Formatting / env
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0

  # Misc
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.2
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3

  # Branding
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/branding/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/brolly_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E5A8E"
  adaptive_icon_foreground: "assets/branding/brolly_icon_foreground.png"

flutter_native_splash:
  color: "#1E5A8E"
  image: "assets/branding/brolly_splash.png"
  color_dark: "#0B2E4E"
  image_dark: "assets/branding/brolly_splash.png"
  android_12:
    color: "#1E5A8E"
    image: "assets/branding/brolly_splash.png"
    color_dark: "#0B2E4E"
    image_dark: "assets/branding/brolly_splash.png"
